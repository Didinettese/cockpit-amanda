<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cockpit — Les Pensées d'Amanda</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#160E1B">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cockpit">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#160E1B; --panel:#211527; --panel-2:#2B1A33; --line:#3A2743;
  --ink:#F6EEF2; --muted:#A991B0; --now:#FF6E8A; --now-soft:#ff6e8a22;
  --done:#E7B860; --done-soft:#e7b8601f;
  --instagram:#E1477E; --telegram:#37A7E0; --youtube:#FF3B5C; --extrait:#B57BE0;
  --tiktok:#25E7DE; --facebook:#4C8DF6; --reddit:#FF5722; --x:#E8E3EA; --snapchat:#FFFC00;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
body{max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 92px)}
h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;margin:0;letter-spacing:-.02em}

.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.top .date{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.top h1{font-size:23px;font-weight:800;line-height:1;margin-top:4px}
.top .sub{font-size:11px;color:var(--muted);margin-top:4px}
.ring{position:relative;width:52px;height:52px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:grid;place-items:center;font-size:12px;font-weight:700;font-family:"Bricolage Grotesque"}

/* global day bar */
.days{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.days::-webkit-scrollbar{display:none}
.day{flex:0 0 auto;padding:8px 13px;border-radius:12px;background:var(--panel);border:1px solid var(--line);
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.15s}
.day.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.day .n{display:block;font-size:10px;font-weight:700;opacity:.7;margin-top:1px}
.day.done-day{color:var(--done)}
.day.active.done-day{color:var(--bg)}

/* mode toggle + platform chips */
.modebar{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:12px}
.modebtn{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-weight:700;font-size:13px;border-radius:10px;cursor:pointer;font-family:Inter}
.modebtn.active{background:var(--ink);color:var(--bg)}
.chips{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:var(--panel);
  font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
.chip.active{color:#160E1B}

/* tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;display:flex;
  background:rgba(22,14,27,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);z-index:40}
.tab{position:relative;flex:1;text-align:center;padding:6px 2px;border-radius:12px;font-size:11px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:.15s;border:none;background:none;font-family:Inter}
.tab .ic{display:block;font-size:19px;margin-bottom:2px;line-height:1}
.tab.active{color:var(--ink)}
.tab.active .ic{filter:drop-shadow(0 0 8px var(--now))}
.tab .bdot{position:absolute;top:2px;right:calc(50% - 20px);width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 8px var(--now);display:none}
.tab.has-alert .bdot{display:block}

.now-card{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--now);
  border-radius:var(--radius);padding:18px;margin-bottom:22px;position:relative;overflow:hidden;
  box-shadow:0 0 0 4px var(--now-soft), 0 18px 40px -20px #000}
.now-card::before{content:"";position:absolute;top:-40%;right:-20%;width:200px;height:200px;
  background:radial-gradient(circle,var(--now-soft),transparent 70%);animation:pulse 3.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.now-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--now)}
.now-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--now);box-shadow:0 0 10px var(--now)}
.now-card.alldone{border-color:var(--done);box-shadow:0 0 0 4px var(--done-soft),0 18px 40px -20px #000}
.now-card.alldone .now-tag{color:var(--done)}
.now-card.alldone .now-tag .dot{background:var(--done);box-shadow:0 0 10px var(--done)}
.alldone-msg{font-family:"Bricolage Grotesque";font-size:22px;font-weight:800;margin-top:10px}
.alldone-sub{color:var(--muted);font-size:14px;margin-top:4px}

.slot-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  margin:20px 4px 10px;display:flex;align-items:center;gap:8px}
.slot-label .time{color:var(--ink);font-family:"Bricolage Grotesque";font-weight:700;letter-spacing:0}
.slot-label .bar{flex:1;height:1px;background:var(--line)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:12px;transition:.2s}
.card.done{opacity:.5}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:9px;color:#160E1B}
.badge .em{font-size:13px}
.chk{width:30px;height:30px;border-radius:9px;border:1.6px solid var(--line);background:transparent;flex:0 0 auto;
  display:grid;place-items:center;cursor:pointer;transition:.15s;color:transparent;font-weight:800;font-size:16px}
.chk.on{background:var(--done);border-color:var(--done);color:var(--bg)}
.meta-line{font-size:12px;color:var(--muted);margin:-4px 0 8px}
.field{margin-top:10px}
.field .k{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.copyrow{display:flex;gap:8px;align-items:stretch}
.copytxt{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 12px;
  font-size:14px;line-height:1.45;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.copytxt.link{font-size:12.5px;color:var(--telegram);font-family:ui-monospace,Menlo,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copybtn{flex:0 0 auto;width:52px;border-radius:11px;border:none;background:var(--now);color:#fff;font-weight:700;
  font-size:12px;cursor:pointer;font-family:"Bricolage Grotesque";display:grid;place-items:center;transition:.12s}
.copybtn:active{transform:scale(.92)}
.copybtn.ok{background:var(--done);color:var(--bg)}
.media{background:var(--panel-2);border:1px dashed var(--line);border-radius:11px;padding:11px 12px;font-size:13px;line-height:1.5;color:var(--muted)}
.media b{color:var(--ink);font-weight:600}
.note{font-size:12px;color:#d99;margin-top:9px;line-height:1.4}

.info{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.55;color:var(--muted)}
.info b{color:var(--ink);font-weight:600}
.info .tt{font-family:"Bricolage Grotesque";font-weight:800;font-size:15px;color:var(--ink);display:block;margin-bottom:6px}
.sec-title{font-family:"Bricolage Grotesque";font-size:14px;font-weight:800;color:var(--ink);margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
.reel-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.reel-h .l{display:flex;align-items:center;gap:8px}
.reel-h .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;color:var(--now)}
.reel-h .t{font-weight:700;font-size:15px}
.tag{font-size:11px;color:var(--muted)}
.kv{font-size:13px;line-height:1.5;margin:4px 0}
.kv b{color:var(--now);font-weight:700}
.beat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.beat.done{opacity:.5}
.beat .bh{display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:"Bricolage Grotesque";font-weight:800;font-size:15px;margin-bottom:6px}
.beat .bh .num{color:var(--done)}
.beat .line{font-size:14px;line-height:1.5;margin:5px 0}
.beat .q{color:var(--ink);font-style:italic;border-left:2px solid var(--now);padding-left:9px}
.beat .cam{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:6px}
.link-row{display:flex;flex-direction:column;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px}
.link-row .lk{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.link-row .lk-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:0;margin-left:7px}
.link-row .lk-del:active{color:var(--now)}
.link-row .lr{display:flex;gap:8px}
.link-row input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 11px;color:var(--telegram);font-family:ui-monospace,Menlo,monospace;font-size:12.5px}

/* idées */
.idea-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.idea-card .ih{font-weight:700;font-size:15px;margin-bottom:4px}
.idea-card .im{font-size:12px;color:var(--muted);margin-bottom:8px}
.btn{width:100%;border:none;border-radius:11px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;font-family:"Bricolage Grotesque"}
.btn.primary{background:var(--now);color:#fff}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--muted)}
.chosen{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--done);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 0 0 4px var(--done-soft)}
.chosen .lab{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--done)}
.chosen .tt{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;margin:8px 0}
.validrow{display:flex;align-items:center;gap:11px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:12px}
.validrow .txt{font-size:13px;color:var(--ink);line-height:1.4}
.banner{background:#4a1020;border:1px solid var(--now);color:#ffd7e0;border-radius:14px;padding:13px 14px;margin-bottom:14px;font-size:13px;line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.banner b{color:#fff}

#toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:99px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;font-family:"Bricolage Grotesque";box-shadow:0 10px 30px -8px #000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:24px;line-height:1.6}
.reset{background:none;border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:8px 16px;font-size:12px;cursor:pointer;margin-top:14px;font-family:Inter}

/* ===== Programmation (pipeline éditable) ===== */
.prog-ep{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;border-left:4px solid var(--line)}
.prog-ep.upcoming{border-left-color:var(--now)}
.prog-ep .row1{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.prog-ep input[type=date]{background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:ui-monospace,Menlo,monospace;font-size:12.5px;padding:8px 9px}
.prog-ep .del{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;width:32px;height:32px;font-size:15px;cursor:pointer;flex:0 0 auto}
.prog-ep .fld{background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:13.5px;padding:9px 10px;width:100%;margin-bottom:7px;font-family:Inter}
.prog-ep .fld.theme{color:var(--muted);font-size:12px}
.stsel{appearance:none;border:none;border-radius:8px;color:#160E1B;font-weight:700;font-size:12px;padding:7px 26px 7px 11px;cursor:pointer;font-family:Inter;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23160E1B'/></svg>");background-repeat:no-repeat;background-position:right 9px center}
.prog-add{width:100%;border:1px dashed var(--line);background:none;color:var(--muted);border-radius:12px;padding:13px;font-weight:700;font-size:13px;cursor:pointer;font-family:"Bricolage Grotesque";margin-bottom:10px}
.prog-add:active{transform:scale(.99)}
.prog-h{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:16px 2px 10px}
.prog-h .t{font-family:"Bricolage Grotesque";font-size:15px;font-weight:800}
.prog-h .c{font-size:12px;color:var(--muted)}
.src-tag{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.src-tag.live{color:var(--done);border-color:var(--done)}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="top">
  <div>
    <div class="date" id="date">—</div>
    <h1 id="dayTitle">—</h1>
    <div class="sub" id="weekSub">—</div>
  </div>
  <div class="ring" id="ringWrap">
    <svg width="52" height="52"><circle cx="26" cy="26" r="22" stroke="#3A2743" stroke-width="5" fill="none"/>
      <circle id="ringFill" cx="26" cy="26" r="22" stroke="#E7B860" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="138"/></svg>
    <div class="val" id="ringVal">0/0</div>
  </div>
</div>

<!-- barre des jours GLOBALE : navigable depuis tous les onglets -->
<div class="days" id="days"></div>

<div id="view-jour"></div>
<div id="view-reels" style="display:none"></div>
<div id="view-script" style="display:none"></div>
<div id="view-prog" style="display:none"></div>
<div id="view-idees" style="display:none"></div>
<div id="view-liens" style="display:none"></div>

<div class="tabs" id="tabs">
  <button class="tab active" data-v="jour"><span class="ic">📅</span>Jour</button>
  <button class="tab" data-v="reels"><span class="ic">🎬</span>Réels</button>
  <button class="tab" data-v="script"><span class="ic">📜</span>Script</button>
  <button class="tab" data-v="prog"><span class="ic">🗂️</span>Prog</button>
  <button class="tab" data-v="idees"><span class="bdot"></span><span class="ic">💡</span>Idées</button>
  <button class="tab" data-v="liens"><span class="ic">🔗</span>Liens</button>
</div>


<div id="toast"></div>

<script>
const DATA = /*__BRIEF_DATA__*/ {};
const PIPE_EMBED = /*__PIPELINE_DATA__*/ {};

const STATUS = {
  idee:{label:"💡 Idée",c:"#6c757d"},
  script:{label:"✍️ Scripté",c:"#fd7e14"},
  tourne:{label:"🎥 Tourné",c:"#0d6efd"},
  monte:{label:"🎞️ Monté",c:"#6f42c1"},
  publie:{label:"✅ Publié",c:"#198754"}
};
const STATUS_ORDER=["idee","script","tourne","monte","publie"];

const PLAT = {
  instagram:{n:"Instagram",em:"📸",c:"var(--instagram)"},
  telegram:{n:"Telegram",em:"✈️",c:"var(--telegram)"},
  youtube:{n:"YouTube",em:"▶️",c:"var(--youtube)"},
  extrait:{n:"Extrait",em:"✂️",c:"var(--extrait)"},
  tiktok:{n:"TikTok",em:"🎵",c:"var(--tiktok)"},
  facebook:{n:"Facebook",em:"📘",c:"var(--facebook)"},
  reddit:{n:"Reddit",em:"👽",c:"var(--reddit)"},
  x:{n:"X",em:"✖️",c:"var(--x)"},
  snapchat:{n:"Snapchat",em:"👻",c:"var(--snapchat)"}
};
const PLAT_ORDER=["youtube","instagram","x","reddit","snapchat","telegram","extrait","tiktok","facebook"];
const DAYS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const WEEK=DATA.meta.isoWeek||"sem";
const today=new Date();
const todayIdx=(today.getDay()+6)%7;
let viewIdx=Math.min(todayIdx, DATA.schedule.length-1);
let calMode="day";               // "day" | "plat"
let platFilter=null;             // platKey when in plat mode
let curTab="jour";
let done=new Set();

/* ---- pipeline (Programmation + Idées) ---- */
let PIPE=null;              // pipeline courant (episodes + ideas)
let pipeLoading=null;       // promesse de chargement
function escAttr(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

/* ---- persistence ---- */
function loadDone(){try{done=new Set(JSON.parse(localStorage.getItem("done:"+WEEK)||"[]"));}catch(e){done=new Set();}}
function saveDone(){try{localStorage.setItem("done:"+WEEK,JSON.stringify([...done]));}catch(e){}}
function setDone(id,on){on?done.add(id):done.delete(id);saveDone();
  if(PIPE){PIPE.progress=PIPE.progress||{};PIPE.progress[WEEK]=[...done];queueSave();}}
function loadLinks(){try{Object.assign(DATA.links,JSON.parse(localStorage.getItem("links:"+WEEK)||"{}"));}catch(e){}}
function saveLink(k,v){try{const s=JSON.parse(localStorage.getItem("links:"+WEEK)||"{}");s[k]=v;localStorage.setItem("links:"+WEEK,JSON.stringify(s));}catch(e){}
  DATA.links[k]=v;
  if(PIPE){PIPE.links=PIPE.links||{};PIPE.links[k]=v;queueSave();}}
function loadIdea(){try{return JSON.parse(localStorage.getItem("idea:"+WEEK)||"null");}catch(e){return null;}}
function saveIdea(o){try{localStorage.setItem("idea:"+WEEK,JSON.stringify(o));}catch(e){}}
let idea=null;

function resolveLien(name){if(!name||name==="—")return "—";return DATA.links[name]||name;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1500);}
async function copy(text,btn){let ok=false;try{await navigator.clipboard.writeText(text);ok=true;}catch(e){try{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity=0;document.body.appendChild(ta);ta.select();ok=document.execCommand("copy");document.body.removeChild(ta);}catch(_){}}if(ok&&btn){btn.classList.add("ok");const o=btn.textContent;btn.textContent="✓";setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;},1100);}toast(ok?"Copié ✓":"Copie impossible");}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function toMin(t){const[a,b]=(t||"00:00").split(":").map(Number);return a*60+b;}
const pid=(d,i)=>"p:"+d+":"+i;

function bindCopies(root){root.querySelectorAll(".copybtn").forEach(b=>b.onclick=e=>copy(decodeURIComponent(e.currentTarget.dataset.c),e.currentTarget));}

/* ============ TABS ============ */
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");curTab=b.dataset.v;
  ["jour","reels","script","prog","idees","liens"].forEach(k=>document.getElementById("view-"+k).style.display=(k===curTab)?"block":"none");
  document.getElementById("ringWrap").style.display=(curTab==="jour"&&calMode==="day")?"block":"none";
  if(curTab==="jour")renderJour();
  if(curTab==="reels")renderReels();
  if(curTab==="script")renderScript();
  if(curTab==="prog")renderProg();
  if(curTab==="idees")renderIdees();
  if(curTab==="liens")renderLiens();
  window.scrollTo({top:0,behavior:"smooth"});
});

/* ============ PIPELINE : chargement / sauvegarde (GitHub via Vercel) ============ */
async function loadPipe(){
  try{
    const r=await fetch("/api/pipeline",{cache:"no-store"});
    if(r.ok){const j=await r.json();if(j&&(j.episodes||j.ideas)){PIPE=j;PIPE._source="api";normalizePipe();reconcileFromPipe();return;}}
  }catch(e){}
  PIPE=JSON.parse(JSON.stringify(PIPE_EMBED||{}));PIPE._source="embed";normalizePipe();reconcileFromPipe();
}
function normalizePipe(){if(!PIPE.episodes)PIPE.episodes=[];if(!PIPE.ideas)PIPE.ideas=[];if(!PIPE.links)PIPE.links={};if(!PIPE.progress)PIPE.progress={};if(!PIPE.linkCats)PIPE.linkCats={};}
// aligne l'état local (liens + coches) sur la source git quand elle est disponible
function reconcileFromPipe(){
  if(!PIPE)return;
  if(PIPE._source==="api"){
    if(PIPE.links)Object.assign(DATA.links,PIPE.links);          // git = vérité pour les liens
    const arr=PIPE.progress&&PIPE.progress[WEEK];
    if(Array.isArray(arr)){done=new Set(arr);saveDone();}         // git = vérité pour les coches
    else if(done.size){PIPE.progress[WEEK]=[...done];queueSave();} // 1re fois : on remonte le local
  }else{
    if(PIPE.links)for(const k in PIPE.links){if(!DATA.links[k])DATA.links[k]=PIPE.links[k];}
  }
  try{renderDays();if(curTab==="jour")renderJour();if(curTab==="liens")renderLiens();}catch(e){}
}
function ensurePipe(cb){
  if(PIPE){cb();return;}
  const el=document.getElementById("view-"+curTab);if(el)el.innerHTML='<div class="info">Chargement du pipeline…</div>';
  if(!pipeLoading)pipeLoading=loadPipe();
  pipeLoading.then(cb);
}
// Tout s'enregistre automatiquement : prog, idées, coches et liens.
// Une écriture git débouncée par salve de changements (aucun bouton).
function markDirty(){queueSave();}
let saveTimer=null;
function queueSave(){
  if(!PIPE||PIPE._source!=="api")return;   // hors-ligne : cache local uniquement
  clearTimeout(saveTimer);saveTimer=setTimeout(pushPipe,1200);
}
async function pushPipe(){
  if(!PIPE||PIPE._source!=="api")return;   // hors-ligne : cache local uniquement
  try{
    const payload={statuses:PIPE.statuses||[],episodes:PIPE.episodes||[],ideas:PIPE.ideas||[],links:PIPE.links||{},progress:PIPE.progress||{},linkCats:PIPE.linkCats||{}};
    const r=await fetch("/api/pipeline",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error(await r.text());
    await r.json().catch(()=>{});   // on ignore l'écho pour ne pas écraser une édition en cours
    toast("Synchronisé ✓");
  }catch(e){toast("Échec de la sauvegarde");}
}
function nextEpisodeDate(){
  const ds=(PIPE.episodes||[]).map(e=>e.date).filter(Boolean).sort();
  let base=ds.length?new Date(ds[ds.length-1]+"T00:00:00"):new Date();
  base.setDate(base.getDate()+7);
  while(base.getDay()!==5)base.setDate(base.getDate()+1); // caler sur un vendredi
  return base.toISOString().slice(0,10);
}
function programIdea(i){
  const it=PIPE.ideas[i];if(!it)return;
  PIPE.episodes.push({id:"ep-"+Date.now(),date:nextEpisodeDate(),theme:it.theme||"",title:it.title||"",status:"idee",lieu:"",notes:it.hook||""});
  PIPE.ideas.splice(i,1);markDirty();
  toast("Programmée ✓ — onglet Prog");
  _renderIdees();
}

  });
  el.innerHTML=h;
  el.querySelectorAll("input").forEach(inp=>inp.onchange=e=>{const val=e.target.value.trim();saveLink(e.target.dataset.k,val);const b=e.target.parentNode.querySelector(".copybtn");if(b)b.dataset.c=encodeURIComponent(val);toast("Lien enregistré ✓");});
  el.querySelectorAll("[data-addcat]").forEach(b=>b.onclick=e=>addLink(e.currentTarget.dataset.addcat));
  el.querySelectorAll("[data-dellink]").forEach(b=>b.onclick=e=>delLink(e.currentTarget.dataset.dellink,e.currentTarget.dataset.delcat));
  bindCopies(el);
}
function addLink(cat){
  if(!PIPE){toast("Patiente une seconde…");return;}
  const name=(prompt("Nom du lien (ex. Fansly) :","")||"").replace(/[<>"]/g,"").trim();
  if(!name)return;
  if(name in DATA.links||(PIPE.links&&name in PIPE.links)){toast("Ce nom existe déjà");return;}
  const url=(prompt("URL du lien :","https://")||"").trim();
  if(!url||url==="https://"){toast("Ajout annulé");return;}
  PIPE.linkCats=PIPE.linkCats||{};PIPE.linkCats[cat]=PIPE.linkCats[cat]||[];
  if(!PIPE.linkCats[cat].includes(name))PIPE.linkCats[cat].push(name);
  saveLink(name,url);          // DATA.links + PIPE.links + localStorage + enregistrement auto
  renderLiens();toast("Lien ajouté ✓");
}
function delLink(name,cat){
  if(!PIPE)return;
  if(!confirm("Supprimer le lien « "+name+" » ?"))return;
  if(PIPE.linkCats&&PIPE.linkCats[cat])PIPE.linkCats[cat]=PIPE.linkCats[cat].filter(k=>k!==name);
  if(PIPE.links)delete PIPE.links[name];
  delete DATA.links[name];
  markDirty();renderLiens();toast("Lien supprimé");
}

/* ---- boot ---- */
loadDone();loadLinks();
pipeLoading=loadPipe();
pipeLoading.then(()=>{if(curTab==="prog")_renderProg();if(curTab==="idees")_renderIdees();});
renderDays();renderJour();
</script>
